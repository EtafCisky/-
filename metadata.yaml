name: favourpro # 这是你的插件的唯一识别名。
display_name: 好感度插件鸭鸭魔改版
desc: 好感度插件鸭鸭魔改版，微调提示词，增加更多管理功能，全局拦截确保好感度标签不泄露，支持优先级设置。
help: |
  管理员命令:
  - /查询好感 <用户ID> - 查询指定用户的状态
  - /设置好感 <用户ID> <数值> - 设置指定用户的好感度
  - /设置印象 <用户ID> <印象> - 设置指定用户的印象
  - /设置关系 <用户ID> <关系> - 设置指定用户的关系
  - /重置好感 <用户ID> - 重置指定用户的全部状态为默认值
  - /重置负面 - 重置所有好感度为负数的用户状态
  - /重置全部 - 重置所有用户的状态数据
  - /好感排行 [数量] - 显示好感度最高的N个用户
  - /负好感排行 [数量] - 显示好感度最低的N个用户

  配置说明:
  - plugin_priority: 插件处理优先级（默认100000，数字越大越先执行）
version: v1.1.0 # 插件的版本号
author: 柯尔
repo: https://github.com/Luna-channel/astrbot_plugin_favourpro # 插件的仓库地址
